# Builds SondeR_cat_setup.exe reproducibly, and (once SignPath Foundation
# approves the project) signs it with a Windows-trusted certificate.
#
# Trigger: manually from the Actions tab, or on a version tag push.
name: Build (and sign) installer

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y
             gcc-mingw-w64-x86-64 binutils-mingw-w64-x86-64

      - name: Fetch miniz
        run: |
          curl -sL -o miniz.zip https://github.com/richgel999/miniz/archive/refs/heads/master.zip
          unzip -q miniz.zip && mv miniz-master miniz

      - name: Build installer
        run: python3 build_exe.py

      - name: Upload unsigned artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: SondeR_cat_setup-unsigned
          path: SondeR_cat_setup.exe

      # ---- SignPath signing (activates once the three secrets exist) ----
      - name: Submit to SignPath
        if: ${{ vars.SIGNPATH_ORG_ID != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: sonder-cat
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Upload signed artifact
        if: ${{ vars.SIGNPATH_ORG_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: SondeR_cat_setup-signed
          path: signed/SondeR_cat_setup.exe
